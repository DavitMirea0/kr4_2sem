version: "3.8"

services:

  # ── Балансировщик ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - backend1
      - backend2
      - backend3

  # ── Backend-серверы (три одинаковых контейнера из одного образа) ─────────────
  backend1:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=backend-1
    networks:
      - app-network

  backend2:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=backend-2
    networks:
      - app-network

  backend3:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=backend-3   # резервный (backup в nginx.conf)
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
