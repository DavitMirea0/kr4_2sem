global
    log stdout format raw local0

defaults
    mode    http
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    option  httpchk GET /health

frontend http_front
    bind *:8080
    default_backend http_back

backend http_back
    balance roundrobin
    server server1 127.0.0.1:3000 check
    server server2 127.0.0.1:3001 check
    server server3 127.0.0.1:3002 backup check
